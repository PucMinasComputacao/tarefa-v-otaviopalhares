<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Home Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">Cidade Igarapé</div>
 
  <input type="text" placeholder="Buscar..." class="search">

  <div class="top-buttons">
    <button>Atual.</button>
    <button>Cont.</button>
    <button>Config.</button>
  </div>
</header>

<div class="login-bar">
  <input type="text" placeholder="Usuário">
  <input type="password" placeholder="Senha">
  <button>Entrar</button>
</div>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <button>HOME</button>
    <button>Canal</button>
    <button>História da Cidade</button>
    <button>Principais Pontos Turísticos</button>
    <button>Programação e Eventos</button>
    <button>Saiba Mais</button>

    <h4>Pontos Importantes</h4>
    <div class="sub-box"></div>
    <div class="sub-box"></div>
    <div class="sub-box"></div>
  </aside>

  <!-- Conteúdo principal -->
  <main class="content">

    <!-- Menu -->
    <div class="menu">
      <button>HOME</button>
      <button>Mais</button>
      <button>Ajuda</button>
    </div>

    <!-- Banner -->
    <div class="banner"></div>

    <!-- Seção Recommended -->
    <h3>Destaque de Imagens</h3>
    <div class="videos">
      <div class="video-card">
        <img src="https://portalagita.com.br/wp-content/uploads/2024/02/Praca-de-igarape.jpeg"  alt="Imagem 1" height="100" width="155">
      </div>
      <div class="video-card">
        <img src="https://portalagita.com.br/wp-content/uploads/2024/11/Igarape-ganha-letreiro-turistico-instagramavel-na-Praca-Miguel-Henriques-2-768x611.jpeg" alt="Imagem 2" height="100" width="155">
      </div>
      <div class="video-card">
        <img src="https://portalagita.com.br/wp-content/uploads/2021/04/Apos-medidas-restritivas-Igarape-tem-queda-de-21-no-numero-de-casos-confirmados-de-Covid-19.jpeg" alt="Imagem 3" height="100" width="155">
      </div>
      <div class="video-card">
        <img src="https://www.minasgerais.com.br/imagens/atracoes/1506107885pMVQBd5p1n.jpg" alt="Imagem 4" height="100" width="155">
      </div>
    </div>

    <!-- Seção Recently -->
    <h3>Restaurantes Mais Conhecidos</h3>
    <div class="videos">
      <div class="video-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvigLFK6GCiISTdW0gTX2ekDCZD8rymcd-1g&s" alt="Imagem 5" height="100" width="155">
      </div>
      <div class="video-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtb3Ub0GTDOuKwPNM8tGWU3656YWuMMKPP4Q&s" alt="Imagem 6" height="100" width="155">
      </div>
      <div class="video-card">
        <img src="https://lh3.googleusercontent.com/p/AF1QipPY_33DJvjZwn2R5kDVAPZzaOWewBUkxp6ipWMT=s680-w680-h510-rw" alt="Imagem 7" height="100" width="155">
      </div>
      <div class="video-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTgYbtV5u-CzzveJA9jhCUwNej5DQ_M0ET2Rg&s" alt="Imagem 8" height="100" width="155">

</html>
